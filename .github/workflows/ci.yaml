name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  UV_FROZEN: true
  COVERAGE_PYTHON: "3.12"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --all-extras
      - name: Ruff format
        run: uv run ruff format --check bids2table tests

      - name: Ruff check
        run: uv run ruff check bids2table tests
      
      - name: Ty check
        run: uv run ty check

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: "true"
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras

      - name: Run non-cloud tests
        run: |
          uv run pytest \
            -m "not cloud and not benchmark" \
            --junitxml=pytest-cloudless.xml \
            --cov-report=xml:coverage.xml \
            --cov=bids2table \
            tests

      - name: Run cloud tests
        run: |
          uv run pytest \
            -m "cloud and not benchmark" \
            --junitxml=pytest-cloud.xml \
            --cov-report=xml:coverage.xml \
            --cov=bids2table \
            --cov-append \
            tests

      - name: Merge JUnit XML reports
        run: |
          uvx junitparser merge \
            pytest-cloudless.xml \
            pytest-cloud.xml \
            pytest.xml

      - name: Record PR number
        if: github.event_name == 'pull_request' && matrix.python-version == env.COVERAGE_PYTHON
        run: echo "${{ github.event.number }}" > pr-number.txt

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request' && matrix.python-version == env.COVERAGE_PYTHON
        with:
          name: coverage
          retention-days: 1
          path: |
            coverage.xml
            pytest.xml
            pr-number.txt
